[tool.uv]
# placo 0.9.16 (openarm sim kinematics) is linked against urdfdom 4.x and
# tinyxml2 10.x (liburdfdom_sensor.so.4.0 / libtinyxml2.so.10). Left unconstrained,
# the workspace resolves cmeel-urdfdom 6.x / cmeel-tinyxml2 11.x, which ship
# .so.6 / .so.11 and break `import placo`. Pin to the versions placo expects.
constraint-dependencies = [
    "cmeel-urdfdom==4.0.1",
    "cmeel-tinyxml2==10.0.0",
]

[tool.uv.workspace]
members = ["packages/*", "integrations/openarm/*"]

# python-prctl (casquette[rpi] → picamera2 → python-prctl) ships sdist only and
# its setup.py requires the libcap dev headers just to report metadata. Declaring
# the metadata here lets uv resolve/lock without building it, so CI (x86, no Pi
# libs) needs no libcap-dev. It is a leaf with no runtime deps.
[[tool.uv.dependency-metadata]]
name = "python-prctl"
version = "1.8.1"
requires-dist = []

# ── Linting ──────────────────────────────────────────────────────────────
# Workspace-wide ruff config. Uses ruff's default rule set (pyflakes F +
# pycodestyle E4/E7/E9); E501 line-length is intentionally left off.
[tool.ruff]
# Generated gRPC stubs are not ours to lint.
extend-exclude = ["**/*_pb2.py", "**/*_pb2_grpc.py", "**/*_pb2.pyi"]

[tool.ruff.lint]
# Deferred (lean gate — tighten later): E402 imports-not-at-top and F841
# unused-locals are common-and-often-intentional in scripts/examples; the
# rest are pure style. Keeping them off lets the gate start green with no
# churn in unrelated files. Correctness rules (F401 unused-import, F811
# redefinition, F821 undefined-name, F-string, E711/E712) stay ON.
ignore = ["E402", "E701", "E702", "E731", "E741", "F841"]
