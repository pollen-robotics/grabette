[project]
name = "grabette-postprocess"
version = "0.1.0"
description = "Post-processing for GRABETTE: SLAM orchestration and LeRobot dataset generation"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "opencv-python",
    "av",
    "click",
    "pandas",
    "tqdm",
    "lerobot[dataset,viz]==0.6.0 ; python_version >= '3.12'",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
