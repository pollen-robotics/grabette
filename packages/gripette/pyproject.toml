[project]
name = "gripette"
version = "0.1.0"
description = "gRPC motor+camera service for the GRABETTE gripette on Pi Zero 2W"
requires-python = ">=3.11"
dependencies = [
    "grpcio>=1.60.0",
    "pillow>=12.1.1",
    "protobuf>=4.25.0",
    "pydantic-settings>=2.13.1",
    # BLE WiFi provisioning seals the password with X25519+HKDF+AES-GCM
    # (gripette.bluetooth.bluetooth_service). Ships aarch64 wheels — no source
    # build on a 64-bit Pi Zero 2W OS (a 32-bit armv7l OS would build from
    # source via Rust, ~slow; deploy 64-bit Pi OS).
    "cryptography>=42.0",
]

[project.optional-dependencies]
rpi = [
    "picamera2",
    "pyserial",
    "rustypot",
]
dev = [
    "grpcio-tools>=1.60.0",
]

urdf = [
    "onshape-to-robot>=1.8.1",
    "pybullet>=3.2.7",
]


[tool.uv]
# On the Pi Zero 2W, numpy is provided by system-site-packages (via picamera2).
# To avoid a slow source build on the Pi, run: uv sync --extra rpi --no-install-package numpy

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "matplotlib>=3.10.8",
]
