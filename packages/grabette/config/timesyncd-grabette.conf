# systemd-timesyncd drop-in — installed to /etc/systemd/timesyncd.conf.d/grabette.conf
# by `make install-ntp` (and as part of `make install-rpi`).
#
# Why: synchronized multi-device recording starts on a shared UTC instant that
# each device waits out on ITS OWN clock, so any clock offset BETWEEN two
# grabettes becomes a start offset between their recordings. The default
# *.pool.ntp.org hostnames resolve to a DIFFERENT physical server on each device
# (run by unrelated operators, with independent offsets → tens of ms of relative
# skew). A single coordinated anycast time service keeps every entry point
# disciplined to the same stratum-1 (GPS) sources, so two devices track each
# other tightly even when they hit different IPs.
#
# For the tightest possible sync (sub-ms), run a local NTP server on the LAN and
# set NTP= to its address instead — same reference clock + short, symmetric path.
[Time]
NTP=time.cloudflare.com
# Fallback stays on another *coordinated* anycast service (not a pool) so a
# cloudflare outage doesn't silently drop the devices onto divergent pool
# members. Both are GPS-backed, so relative skew stays small even on fallback.
FallbackNTP=time.google.com
