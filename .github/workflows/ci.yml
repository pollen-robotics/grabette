name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  # Real gate that the single workspace lock resolves and installs end to end
  # on a clean machine, and that every service package imports.
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        # python-prctl (required by picamera2) has only a source distribution.
        # uv lock --check rebuilds it from the sdist on a cold cache, which
        # needs the libcap development headers.
        run: sudo apt-get install -y libcap-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lock is up to date
        run: uv lock --check

      - name: Build the full workspace environment
        run: uv sync --all-packages

      - name: Import smoke test
        # The core services + postprocess + model import with no exotic system
        # libs. The OpenArm sim is validated by the build step above; importing
        # it at runtime additionally needs system urdfdom (placo) — left to a
        # follow-up CI step. Linting (ruff) is also a follow-up: no config yet.
        run: |
          uv run python - <<'PY'
          import importlib, sys
          mods = ["grabette", "casquette", "gripette",
                  "grabette_postprocess", "openarm_gripette_model"]
          failed = []
          for m in mods:
              try:
                  importlib.import_module(m)
                  print(f"OK   {m}")
              except Exception as e:
                  print(f"FAIL {m}: {type(e).__name__}: {e}")
                  failed.append(m)
          sys.exit(1 if failed else 0)
          PY

  # Pure-logic unit tests under tests/ (see [tool.pytest.ini_options]). Kept as a
  # separate job so a test failure is distinct from a build/resolve failure.
  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: sudo apt-get install -y libcap-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build the workspace environment
        # Includes the root [dependency-groups] dev group (pytest) by default.
        run: uv sync --all-packages

      - name: Unit tests
        run: uv run pytest
